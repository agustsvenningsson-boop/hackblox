<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>:(</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0078d7;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 10vh 12vw;
    color: white;
    overflow: hidden;
    cursor: none;
  }
  .sad-face {
    font-size: 120px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeIn 0.3s 0.2s forwards;
  }
  h1 {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 300;
    margin-bottom: 30px;
    line-height: 1.3;
    opacity: 0;
    animation: fadeIn 0.3s 0.5s forwards;
  }
  .info {
    font-size: clamp(13px, 1.5vw, 16px);
    font-weight: 300;
    line-height: 1.8;
    max-width: 600px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 0.3s 0.8s forwards;
  }
  .progress-section {
    opacity: 0;
    animation: fadeIn 0.3s 1.2s forwards;
  }
  .progress-label { font-size: 16px; font-weight: 300; margin-bottom: 10px; }
  .dots { display: flex; gap: 8px; }
  .dot { width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.3; }
  .stop-code {
    position: absolute;
    bottom: 8vh; left: 12vw;
    font-size: 13px; font-weight: 300;
    opacity: 0;
    animation: fadeIn 0.3s 1.5s forwards;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  #redscreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #ff0000;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="sad-face">:(</div>
<h1>Your PC ran into a problem and<br>needs to restart.</h1>
<div class="info">
  We're just collecting some error info, and then we'll restart for you.<br><br>
  If you'd like to know more, you can search online later for this error:<br>
  <strong>CRITICAL_PROCESS_DIED</strong>
</div>
<div class="progress-section">
  <div class="progress-label" id="pct-label">0% complete</div>
  <div class="dots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
    <div class="dot" id="d5"></div>
  </div>
</div>
<div class="stop-code">Stop code: CRITICAL_PROCESS_DIED</div>

<div id="redscreen"></div>

<script>
  let pct = 0;
  const label = document.getElementById('pct-label');
  const dots = [1,2,3,4,5].map(i => document.getElementById('d'+i));

  let activeDot = 0;
  setInterval(() => {
    dots.forEach(d => d.style.opacity = '0.3');
    dots[activeDot].style.opacity = '1';
    activeDot = (activeDot + 1) % dots.length;
  }, 400);

  function tick() {
    if (pct < 100) {
      pct += Math.random() * 1.5 + 0.3;
      if (pct > 100) pct = 100;
      label.textContent = Math.floor(pct) + '% complete';
      setTimeout(tick, 130);
    } else {
      label.textContent = '100% complete';
      setTimeout(boom, 1200);
    }
  }

  function boom() {
    // Larm
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    function alarm() {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(1600, ac.currentTime + 0.5);
      o.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 1.0);
      o.frequency.exponentialRampToValueAtTime(2000, ac.currentTime + 1.5);
      g.gain.setValueAtTime(0.001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(2.5, ac.currentTime + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.7);
      o.start(ac.currentTime);
      o.stop(ac.currentTime + 1.8);
      setTimeout(alarm, 1900);
    }
    alarm();

    // Röd skärm
    document.getElementById('redscreen').style.display = 'block';

    // Byt bakgrund via PowerShell (Windows)
    try {
      var ws = new ActiveXObject('WScript.Shell');
      ws.Run('set_wallpaper.bat', 0, false);
    } catch(e) {}
  }

  setTimeout(tick, 1500);
</script>
</body>
</html>
